name: Release skill bundle

# Builds the prebuilt binaries the agent skill bundles, from this repository
# (static musl binaries for Linux, matching sandboxed agent environments such
# as Claude.ai, plus macOS), packages them into the ileap-cli skill via
# scripts/package-skill.sh, and attaches the resulting skill zip to a GitHub
# release when a tag is pushed.
#
# Note: reqwest currently uses native-tls, so the musl builds statically link
# OpenSSL (hence the alpine container + openssl-libs-static). Switching
# reqwest to rustls-tls would simplify this.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ileap-Linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: ileap-Linux-aarch64
    runs-on: ${{ matrix.os }}
    container: rust:alpine
    env:
      OPENSSL_STATIC: "1"
    steps:
      - run: apk add -q musl-dev git pkgconfig openssl-dev openssl-libs-static tar
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - run: cargo build --release --locked
      - run: cp target/release/ileap ${{ matrix.artifact }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo build --release --locked
      - run: cp target/release/ileap ileap-Darwin-arm64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ileap-Darwin-arm64
          path: ileap-Darwin-arm64
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Download the per-arch binaries straight into the skill's bin/ dir.
      # Each artifact contains a single ileap-<OS>-<ARCH> file named to match
      # what SKILL.md looks up at runtime, so merge-multiple lands them in place.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          merge-multiple: true
          path: .agents/skills/ileap-cli/bin
      # upload-artifact does not preserve the executable bit; restore it so the
      # bundled binaries are runnable straight out of the zip.
      - run: chmod +x .agents/skills/ileap-cli/bin/ileap-*
      - run: scripts/package-skill.sh
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: dist/ileap-cli-skill.zip
