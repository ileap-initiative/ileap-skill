tagline = "Turn iLEAP transport-emissions data into dashboards, scenarios and reports — by asking Claude in plain language."
cta_label = "Install the skill"
provider_note = "An open skill provided by sustainability NGOs. Works with Claude today; portable to any agent that supports skills or MCP."
