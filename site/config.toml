# Zola configuration for the iLEAP skill microsite (see docs/adr/0010).
# TODO(ADR-0010 open item): set base_url to the chosen *.ileap.global subdomain
# before launch.
base_url = "https://skill.ileap.global"
title = "iLEAP Skill for Claude"
